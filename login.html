<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Islamic History CMS</title>
  <link rel="stylesheet" href="admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    /* Login Page Specific Styles */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0f1e 0%, #0d1428 100%);
      padding: 20px;
      position: relative;
    }
    
    .login-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(201,168,76,0.05) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }
    
    .login-card {
      background: rgba(15, 28, 48, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.1);
      transition: transform 0.3s ease;
      animation: fadeInUp 0.5s ease;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #9a7d35, #c9a84c);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 16px;
      box-shadow: 0 0 20px rgba(201,168,76,0.3);
    }
    
    .login-logo h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      color: var(--gold-light, #e6c76e);
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }
    
    .login-logo p {
      font-size: 0.85rem;
      color: var(--text-muted, #6b7280);
    }
    
    .login-error {
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 24px;
      color: #f87171;
      font-size: 0.85rem;
      display: none;
      align-items: center;
      gap: 8px;
    }
    
    .login-error.show {
      display: flex;
    }
    
    .login-field-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 20px;
    }
    
    .login-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary, #9ca3af);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    
    .login-input-wrap {
      position: relative;
    }
    
    .login-input {
      width: 100%;
      background: var(--bg-input, #0f172a);
      border: 1px solid var(--border, rgba(201,168,76,0.13));
      border-radius: 12px;
      padding: 12px 14px 12px 42px;
      color: var(--text-primary, #e5e7eb);
      font-size: 0.9rem;
      outline: none;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }
    
    .login-input:focus {
      border-color: rgba(201,168,76,0.5);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
    }
    
    .login-input::placeholder {
      color: var(--text-muted, #6b7280);
    }
    
    .login-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      color: var(--text-muted, #6b7280);
    }
    
    .toggle-pwd {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted, #6b7280);
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    
    .toggle-pwd:hover {
      color: var(--gold-light, #e6c76e);
    }
    
    .login-submit {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #9a7d35, #c9a84c);
      border: none;
      border-radius: 12px;
      color: #0a0f1e;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Cinzel', serif;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 16px rgba(201,168,76,0.2);
      margin-top: 8px;
    }
    
    .login-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 22px rgba(201,168,76,0.4);
    }
    
    .login-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    
    .login-hint {
      text-align: center;
      margin-top: 24px;
      font-size: 0.78rem;
      color: var(--text-muted, #6b7280);
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border, rgba(201,168,76,0.13));
      border-radius: 12px;
      padding: 12px 14px;
      line-height: 1.6;
    }
    
    .login-hint strong {
      color: var(--gold-light, #e6c76e);
    }
    
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(10,15,30,0.3);
      border-top-color: #0a0f1e;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    
    /* Back to website link */
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: var(--text-muted, #6b7280);
      font-size: 0.8rem;
      text-decoration: none;
      transition: color 0.3s ease;
    }
    
    .back-link a:hover {
      color: var(--gold-light, #e6c76e);
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">🌙</div>
        <h1>Islamic History CMS</h1>
        <p>Content Management System</p>
      </div>

      <div class="login-error" id="loginError">
        <span>⚠️</span> Invalid username or password. Please try again.
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="login-field-group">
          <label class="login-label" for="username">Username</label>
          <div class="login-input-wrap">
            <span class="login-icon">👤</span>
            <input class="login-input" type="text" id="username" placeholder="Enter username" required autocomplete="username">
          </div>
        </div>

        <div class="login-field-group">
          <label class="login-label" for="password">Password</label>
          <div class="login-input-wrap">
            <span class="login-icon">🔑</span>
            <input class="login-input" type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
            <button type="button" class="toggle-pwd" onclick="togglePasswordVisibility()" id="togglePwdBtn">👁️</button>
          </div>
        </div>

        <button type="submit" class="login-submit" id="loginBtn">
          🔐 Sign In to Admin Panel
        </button>
      </form>

      <div class="login-hint">
        💡 <strong>Demo Credentials:</strong> Username: <strong>admin</strong> | Password: <strong>admin123</strong>
      </div>
      
      <div class="back-link">
        <a href="index.html">← Back to Website</a>
      </div>
    </div>
  </div>

  <script>
    // Initialize default credentials if not set
    (function initCredentials() {
      if (!localStorage.getItem('cms_credentials')) {
        const defaultCreds = {
          username: 'admin',
          password: 'admin123',
          name: 'Administrator'
        };
        localStorage.setItem('cms_credentials', JSON.stringify(defaultCreds));
        console.log('Default credentials initialized');
      }
    })();
    
    // Redirect if already logged in (check both session and session_time)
    (function checkExistingSession() {
      const session = localStorage.getItem('cms_session');
      const sessionTime = localStorage.getItem('cms_session_time');
      if (session === 'active' && sessionTime) {
        // Check if session is not too old (optional: 24 hours expiry)
        const sessionAge = Date.now() - parseInt(sessionTime);
        const MAX_SESSION_AGE = 24 * 60 * 60 * 1000; // 24 hours
        
        if (sessionAge < MAX_SESSION_AGE) {
          window.location.href = 'admin.html';
        } else {
          // Session expired, clear it
          localStorage.removeItem('cms_session');
          localStorage.removeItem('cms_session_time');
        }
      }
    })();
    
    // Toggle password visibility
    function togglePasswordVisibility() {
      const passwordInput = document.getElementById('password');
      const toggleBtn = document.getElementById('togglePwdBtn');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleBtn.textContent = '🙈';
        toggleBtn.setAttribute('aria-label', 'Hide password');
      } else {
        passwordInput.type = 'password';
        toggleBtn.textContent = '👁️';
        toggleBtn.setAttribute('aria-label', 'Show password');
      }
    }
    
    // Handle login form submission
    async function handleLogin(event) {
      event.preventDefault();
      
      const loginBtn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('loginError');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      
      const username = usernameInput.value.trim();
      const password = passwordInput.value;
      
      // Validate inputs
      if (!username || !password) {
        errorDiv.textContent = '⚠️ Please enter both username and password.';
        errorDiv.classList.add('show');
        return;
      }
      
      // Disable button and show loading state
      loginBtn.disabled = true;
      const originalButtonText = loginBtn.innerHTML;
      loginBtn.innerHTML = '<span class="spinner"></span> Signing in...';
      
      // Hide previous error
      errorDiv.classList.remove('show');
      
      // Simulate async operation (for smoother UX)
      setTimeout(() => {
        try {
          const credentials = JSON.parse(localStorage.getItem('cms_credentials'));
          
          if (credentials && username === credentials.username && password === credentials.password) {
            // Set session
            localStorage.setItem('cms_session', 'active');
            localStorage.setItem('cms_session_time', Date.now().toString());
            
            // Optional: store last login username
            localStorage.setItem('cms_last_user', username);
            
            // Redirect to admin panel
            window.location.href = 'admin.html';
          } else {
            // Show error
            errorDiv.innerHTML = '<span>⚠️</span> Invalid username or password. Please try again.';
            errorDiv.classList.add('show');
            
            // Reset form
            passwordInput.value = '';
            passwordInput.focus();
            
            // Re-enable button
            loginBtn.disabled = false;
            loginBtn.innerHTML = originalButtonText;
          }
        } catch (err) {
          console.error('Login error:', err);
          errorDiv.innerHTML = '<span>⚠️</span> An error occurred. Please try again.';
          errorDiv.classList.add('show');
          loginBtn.disabled = false;
          loginBtn.innerHTML = originalButtonText;
        }
      }, 500);
    }
    
    // Add Enter key support is already handled by form submit
    // Add some nice effects
    document.addEventListener('DOMContentLoaded', function() {
      // Focus on username field on page load
      const usernameField = document.getElementById('username');
      if (usernameField) {
        usernameField.focus();
      }
      
      // Add ripple effect to button (optional)
      const loginBtn = document.getElementById('loginBtn');
      if (loginBtn) {
        loginBtn.addEventListener('click', function(e) {
          const rect = this.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          
          const ripple = document.createElement('span');
          ripple.style.position = 'absolute';
          ripple.style.width = '0px';
          ripple.style.height = '0px';
          ripple.style.borderRadius = '50%';
          ripple.style.backgroundColor = 'rgba(255,255,255,0.3)';
          ripple.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
          ripple.style.transition = 'all 0.5s ease';
          ripple.style.pointerEvents = 'none';
          
          this.style.position = 'relative';
          this.style.overflow = 'hidden';
          this.appendChild(ripple);
          
          setTimeout(() => {
            ripple.style.width = '200px';
            ripple.style.height = '200px';
            ripple.style.opacity = '0';
          }, 10);
          
          setTimeout(() => {
            ripple.remove();
          }, 500);
        });
      }
    });
  </script>
</body>
</html>
